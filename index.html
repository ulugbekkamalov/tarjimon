<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Ovozli Tarjimon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .label { font-size: 11px; color: #888; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

  /* Mikrofon */
  .mic-wrap { display: flex; flex-direction: column; align-items: center; padding: 1rem 0; }
  .mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; font-size: 32px; background: #222; color: #fff; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .mic-btn:hover { background: #444; transform: scale(1.05); }
  .mic-btn.recording { background: #e74c3c; animation: micPulse 1.2s infinite; }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)} 50%{box-shadow:0 0 0 16px rgba(231,76,60,0)} }
  .mic-status { margin-top: 10px; font-size: 13px; color: #888; }
  .rec-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; margin-right: 5px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* Matn qutisi */
  .text-box { width: 100%; min-height: 90px; padding: 10px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; font-size: 14px; color: #222; line-height: 1.6; font-family: Arial, sans-serif; resize: vertical; outline: none; }
  .text-box:focus { border-color: #777; background: #fff; }

  /* Til tanlash */
  .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; margin-bottom: 10px; }
  .lang-chip { padding: 7px 10px; border-radius: 8px; border: 1px solid #e0e0e0; font-size: 13px; cursor: pointer; background: #fafafa; color: #444; transition: all .15s; text-align: center; }
  .lang-chip:hover { background: #f0f0f0; border-color: #bbb; }
  .lang-chip.active { background: #222; color: #fff; border-color: #222; font-weight: 700; }
  .lang-search { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; font-size: 14px; color: #222; outline: none; margin-bottom: 10px; }
  .lang-search:focus { border-color: #777; }

  /* Tarjima natijasi */
  .result-wrap { position: relative; }
  .result-box { width: 100%; min-height: 90px; padding: 10px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; font-size: 14px; color: #222; line-height: 1.6; white-space: pre-wrap; }
  .result-placeholder { color: #bbb; }
  .copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; background: #fff; color: #555; transition: all .15s; }
  .copy-btn:hover { background: #f0f0f0; }

  /* Tugmalar */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  button { padding: 9px 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; cursor: pointer; background: #fff; color: #222; transition: all .15s; font-family: Arial, sans-serif; }
  button:hover { background: #f0f0f0; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #222; color: #fff; border-color: #222; font-weight: 700; }
  .btn-primary:hover { background: #444; }
  .btn-danger { color: #c0392b; border-color: #e0b0b0; }
  .btn-danger:hover { background: #fff0f0; }

  /* Status */
  .status { font-size: 13px; margin-top: 8px; min-height: 18px; }
  .status.ok  { color: #27ae60; font-weight: 600; }
  .status.err { color: #c0392b; font-weight: 600; }
  .status.info { color: #2980b9; }

  /* Loading */
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #222; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Nutq tili */
  .speech-langs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .slang-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; background: #f5f5f5; color: #555; transition: all .15s; }
  .slang-btn:hover { background: #eee; }
  .slang-btn.active { background: #222; color: #fff; border-color: #222; font-weight: 600; }

  /* TTS tugma */
  .speak-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; background: #f5f5f5; color: #555; margin-top: 8px; transition: all .15s; }
  .speak-btn:hover { background: #eee; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #eee; }
    .card { background: #252525; border-color: #333; }
    input, .text-box, .result-box, .lang-search { background: #2a2a2a; color: #eee; border-color: #444; }
    button { background: #2a2a2a; color: #eee; border-color: #444; }
    button:hover { background: #333; }
    .btn-primary { background: #eee; color: #111; border-color: #eee; }
    .btn-primary:hover { background: #ccc; }
    .lang-chip { background: #2a2a2a; color: #ccc; border-color: #444; }
    .lang-chip:hover { background: #333; }
    .lang-chip.active { background: #eee; color: #111; border-color: #eee; }
    .slang-btn { background: #2a2a2a; color: #ccc; border-color: #444; }
    .slang-btn.active { background: #eee; color: #111; border-color: #eee; }
    .copy-btn { background: #333; color: #ccc; border-color: #555; }
    .copy-btn:hover { background: #444; }
    .speak-btn { background: #2a2a2a; color: #ccc; border-color: #444; }
    .speak-btn:hover { background: #333; }
    .mic-btn { background: #eee; color: #111; }
    .mic-btn.recording { background: #e74c3c; color: #fff; }
  }

  @media (max-width: 480px) {
    .lang-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🌍 Ovozli Tarjimon</h1>
  <p class="sub">Gapiring yoki matn yozing — istalgan tilga tarjima qilinadi</p>

  <!-- 1. Ovoz yozish -->
  <div class="card">
    <div class="label">1. Nutq tili</div>
    <div class="speech-langs">
      <button class="slang-btn active" onclick="setSpeechLang('uz-UZ', this)">🇺🇿 O'zbek</button>
      <button class="slang-btn" onclick="setSpeechLang('ru-RU', this)">🇷🇺 Rus</button>
      <button class="slang-btn" onclick="setSpeechLang('en-US', this)">🇺🇸 Ingliz</button>
      <button class="slang-btn" onclick="setSpeechLang('ar-SA', this)">🇸🇦 Arab</button>
      <button class="slang-btn" onclick="setSpeechLang('tr-TR', this)">🇹🇷 Turk</button>
      <button class="slang-btn" onclick="setSpeechLang('de-DE', this)">🇩🇪 Nemis</button>
      <button class="slang-btn" onclick="setSpeechLang('fr-FR', this)">🇫🇷 Fransuz</button>
      <button class="slang-btn" onclick="setSpeechLang('zh-CN', this)">🇨🇳 Xitoy</button>
    </div>

    <div class="label">Mikrofon</div>
    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn" onclick="toggleRec()">🎤</button>
      <div class="mic-status" id="micStatus">Bosing va gapiring</div>
    </div>

    <div class="label">Yozib olingan matn</div>
    <textarea class="text-box" id="sourceText" placeholder="Matn shu yerda paydo bo'ladi yoki o'zingiz yozing..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="translate()">🌐 Tarjima qil</button>
      <button onclick="clearAll()">Tozala</button>
    </div>
    <div class="status" id="mainStatus"></div>
  </div>

  <!-- 2. Tarjima tili -->
  <div class="card">
    <div class="label">2. Tarjima tiliga tanlang</div>
    <input class="lang-search" type="text" id="langSearch" placeholder="Til qidirish... (o'zbek, ingliz, rus...)" oninput="filterLangs()">
    <div class="lang-grid" id="langGrid"></div>
  </div>

  <!-- 3. Natija -->
  <div class="card">
    <div class="label">3. Tarjima natijasi</div>
    <div class="result-wrap">
      <div class="result-box" id="resultBox">
        <span class="result-placeholder">Tarjima natijasi bu yerda chiqadi...</span>
      </div>
      <button class="copy-btn" onclick="copyResult()">Nusxa</button>
    </div>
    <button class="speak-btn" onclick="speakResult()">🔊 O'qib ber</button>
    <div class="status" id="resultStatus"></div>
  </div>
</div>

<script>
  // Tillar ro'yxati
  const LANGS = [
    { code: 'uz', name: "O'zbek",    flag: '🇺🇿' },
    { code: 'ru', name: 'Rus',       flag: '🇷🇺' },
    { code: 'en', name: 'Ingliz',    flag: '🇺🇸' },
    { code: 'tr', name: 'Turk',      flag: '🇹🇷' },
    { code: 'ar', name: 'Arab',      flag: '🇸🇦' },
    { code: 'de', name: 'Nemis',     flag: '🇩🇪' },
    { code: 'fr', name: 'Fransuz',   flag: '🇫🇷' },
    { code: 'es', name: 'Ispan',     flag: '🇪🇸' },
    { code: 'it', name: 'Italyan',   flag: '🇮🇹' },
    { code: 'pt', name: 'Portugal',  flag: '🇵🇹' },
    { code: 'zh', name: 'Xitoy',     flag: '🇨🇳' },
    { code: 'ja', name: 'Yapon',     flag: '🇯🇵' },
    { code: 'ko', name: 'Koreys',    flag: '🇰🇷' },
    { code: 'hi', name: 'Hind',      flag: '🇮🇳' },
    { code: 'fa', name: 'Fors',      flag: '🇮🇷' },
    { code: 'kk', name: 'Qozoq',     flag: '🇰🇿' },
    { code: 'ky', name: 'Qirg\'iz',  flag: '🇰🇬' },
    { code: 'az', name: 'Ozarbayjon',flag: '🇦🇿' },
    { code: 'uk', name: 'Ukrain',    flag: '🇺🇦' },
    { code: 'pl', name: 'Polyak',    flag: '🇵🇱' },
    { code: 'nl', name: 'Golland',   flag: '🇳🇱' },
    { code: 'sv', name: 'Shved',     flag: '🇸🇪' },
    { code: 'he', name: 'Ibroniy',   flag: '🇮🇱' },
    { code: 'id', name: 'Indonez',   flag: '🇮🇩' },
  ];

  let selectedTargetLang = 'en';
  let speechLang = 'uz-UZ';
  let recognition = null;
  let isRecording = false;
  let fullTranscript = '';
  let translatedText = '';

  // Til kartalarini chizish
  function renderLangs(list) {
    const grid = document.getElementById('langGrid');
    grid.innerHTML = list.map(l =>
      `<div class="lang-chip${l.code === selectedTargetLang ? ' active' : ''}"
        onclick="selectLang('${l.code}', this)">
        ${l.flag} ${l.name}
      </div>`
    ).join('');
  }

  function filterLangs() {
    const q = document.getElementById('langSearch').value.toLowerCase();
    const filtered = LANGS.filter(l =>
      l.name.toLowerCase().includes(q) || l.code.includes(q)
    );
    renderLangs(filtered);
  }

  function selectLang(code, el) {
    selectedTargetLang = code;
    document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  renderLangs(LANGS);

  // Nutq tili
  function setSpeechLang(lang, btn) {
    speechLang = lang;
    document.querySelectorAll('.slang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (recognition) recognition.lang = lang;
  }

  // Mikrofon
  function toggleRec() {
    if (isRecording) stopRec();
    else startRec();
  }

  function startRec() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setStatus('mainStatus', 'Brauzeringiz mikrofon qo\'llab-quvvatlamaydi (Chrome ishlatib ko\'ring)', 'err');
      return;
    }
    fullTranscript = '';
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = speechLang;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹';
      document.getElementById('micStatus').innerHTML = '<span class="rec-dot"></span>Yozilmoqda... (to\'xtatish uchun bosing)';
    };

    recognition.onresult = (e) => {
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      fullTranscript += final;
      document.getElementById('sourceText').value = (fullTranscript + interim).trim();
    };

    recognition.onerror = (e) => {
      setStatus('mainStatus', 'Mikrofon xatosi: ' + e.error, 'err');
      stopRec();
    };

    recognition.onend = () => {
      if (isRecording) recognition.start();
    };

    recognition.start();
  }

  function stopRec() {
    isRecording = false;
    if (recognition) recognition.stop();
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micStatus').textContent = 'Bosing va gapiring';
    if (fullTranscript.trim()) {
      setStatus('mainStatus', 'Yozib olindi! Tarjima qilish uchun tugmani bosing.', 'ok');
    }
  }

  // Tarjima
  async function translate() {
    const text = document.getElementById('sourceText').value.trim();
    if (!text) {
      setStatus('mainStatus', 'Matn kiriting yoki gapiring!', 'err');
      return;
    }

    setStatus('mainStatus', '<span class="loading"></span>Tarjima qilinmoqda...', 'info');
    document.getElementById('resultBox').innerHTML = '<span class="result-placeholder">Tarjima qilinmoqda...</span>';

    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|${selectedTargetLang}`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.responseStatus === 200) {
        translatedText = data.responseData.translatedText;
        document.getElementById('resultBox').textContent = translatedText;
        const langName = LANGS.find(l => l.code === selectedTargetLang)?.name || selectedTargetLang;
        setStatus('mainStatus', `✅ ${langName} tiliga tarjima qilindi!`, 'ok');
      } else {
        throw new Error(data.responseDetails || 'Tarjima xatosi');
      }
    } catch (err) {
      document.getElementById('resultBox').innerHTML = '<span class="result-placeholder">Xatolik yuz berdi</span>';
      setStatus('mainStatus', 'Xatolik: ' + err.message, 'err');
    }
  }

  // Tarjimani o'qib berish
  function speakResult() {
    if (!translatedText) {
      setStatus('resultStatus', 'Avval tarjima qiling!', 'err');
      return;
    }
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(translatedText);
    utt.lang = selectedTargetLang;
    utt.onstart = () => setStatus('resultStatus', '🔊 O\'qilmoqda...', 'info');
    utt.onend   = () => setStatus('resultStatus', '', '');
    speechSynthesis.speak(utt);
  }

  // Nusxa
  function copyResult() {
    if (!translatedText) return;
    navigator.clipboard.writeText(translatedText)
      .then(() => setStatus('resultStatus', 'Nusxa olindi!', 'ok'));
  }

  function clearAll() {
    fullTranscript = '';
    translatedText = '';
    document.getElementById('sourceText').value = '';
    document.getElementById('resultBox').innerHTML = '<span class="result-placeholder">Tarjima natijasi bu yerda chiqadi...</span>';
    setStatus('mainStatus', '', '');
    setStatus('resultStatus', '', '');
  }

  function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.innerHTML = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }
</script>
</body>
</html>
